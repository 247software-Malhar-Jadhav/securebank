# nginx config for serving the SecureBank SPA and proxying the API.
#
# Two responsibilities:
#  1. Serve the compiled React app, with SPA fallback: any unknown path falls back
#     to index.html so client-side routes (e.g. /accounts/42) work on hard refresh.
#  2. Reverse-proxy /api to the backend service. The hostname `securebank-api` is the
#     service name in docker-compose / Kubernetes; adjust via your orchestration.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-cache fingerprinted static assets (Vite emits hashed filenames).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Reverse-proxy API calls to the backend. The backend already serves under /api,
    # so we forward the path unchanged.
    location /api/ {
        proxy_pass http://securebank-api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SPA fallback: serve index.html for any route the static files don't match.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Basic security headers.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
