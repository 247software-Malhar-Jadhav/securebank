# =============================================================================
# SecureBank — full local stack (docker compose)
# =============================================================================
# Conforms to docs/PROJECT_SPEC.md. Service hostnames here (postgres, redis,
# kafka, rabbitmq) are exactly what the backend's Spring profile 'docker'
# expects.
#
# Quick start:
#   cp .env.example .env
#   docker compose up -d --build
#   # backend  -> http://localhost:8080/api  (Swagger: /api/swagger-ui.html)
#   # frontend -> http://localhost:8081
#
# Optional observability stack (kafka-ui, prometheus, grafana):
#   docker compose --profile observability up -d
#
# See infra/docs/running-with-docker.md for the full runbook.
# =============================================================================

name: securebank

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — system of record
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16
    container_name: securebank-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-securebank}
      POSTGRES_USER: ${POSTGRES_USER:-securebank}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-securebank}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      # pg_isready returns 0 only once Postgres is genuinely accepting connections.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-securebank} -d ${POSTGRES_DB:-securebank}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks: [securebank]

  # ---------------------------------------------------------------------------
  # Redis 7 — cache, rate-limit counters, Redisson distributed locks
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7
    container_name: securebank-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks: [securebank]

  # ---------------------------------------------------------------------------
  # Zookeeper — coordination for Kafka (Confluent images)
  # ---------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: securebank-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w 2 localhost 2181 | grep -q imok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks: [securebank]

  # ---------------------------------------------------------------------------
  # Kafka — domain-event backbone
  # ---------------------------------------------------------------------------
  # Two listeners:
  #   - INTERNAL (kafka:29092) for container-to-container traffic (the backend).
  #   - EXTERNAL (localhost:9092) for tools running on your host machine.
  # The spec fixes the host bootstrap as localhost:9092.
  # ---------------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: securebank-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s
    networks: [securebank]

  # ---------------------------------------------------------------------------
  # kafka-init — one-shot container that creates the three spec topics
  # ---------------------------------------------------------------------------
  # Confluent images do not honour the bitnami KAFKA_CREATE_TOPICS variable, so
  # we create them explicitly. This container exits 0 once topics exist.
  # ---------------------------------------------------------------------------
  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: securebank-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        echo "Creating SecureBank Kafka topics..."
        for t in securebank.transactions securebank.fraud-alerts securebank.notifications; do
          kafka-topics --bootstrap-server kafka:29092 \
            --create --if-not-exists \
            --topic "$$t" \
            --partitions ${KAFKA_TOPIC_PARTITIONS:-3} \
            --replication-factor 1
        done
        echo "Topics present:"
        kafka-topics --bootstrap-server kafka:29092 --list
    networks: [securebank]
    restart: "no"

  # ---------------------------------------------------------------------------
  # RabbitMQ — notification delivery work queue (with management UI)
  # ---------------------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3-management
    container_name: securebank-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-securebank}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-securebank}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"      # AMQP
      - "${RABBITMQ_MGMT_PORT:-15672}:15672" # management UI
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks: [securebank]

  # ---------------------------------------------------------------------------
  # Backend — Spring Boot API (built by the backend team's Dockerfile)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: ghcr.io/247software-malhar-jadhav/securebank-backend:local
    container_name: securebank-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      SPRING_PROFILES_ACTIVE: docker
      # --- Datasource (profile 'docker' uses the service hostname) ---
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-securebank}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-securebank}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-securebank}
      # --- Redis ---
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      # --- Kafka (internal listener) ---
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      # --- RabbitMQ ---
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-securebank}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-securebank}
      # --- Security / AI ---
      SECUREBANK_JWT_SECRET: ${JWT_SECRET:-change-me-please-use-a-32+char-secret-in-prod}
      SECUREBANK_AI_API_KEY: ${AI_API_KEY:-}
      # --- Virtual threads (Project Loom) ---
      JAVA_TOOL_OPTIONS: >-
        -XX:+UseZGC -XX:+ZGenerational
        -Djdk.virtualThreadScheduler.parallelism=${VT_PARALLELISM:-0}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/actuator/health/readiness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 60s
    networks: [securebank]

  # ---------------------------------------------------------------------------
  # Frontend — React app served by nginx (built by the frontend team's Dockerfile)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    image: ghcr.io/247software-malhar-jadhav/securebank-frontend:local
    container_name: securebank-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-8081}:80"
    networks: [securebank]

  # ===========================================================================
  # Observability profile — opt-in: docker compose --profile observability up
  # ===========================================================================
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: securebank-kafka-ui
    profiles: [observability]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: securebank
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      DYNAMIC_CONFIG_ENABLED: "true"
    ports:
      - "${KAFKA_UI_PORT:-8082}:8080"
    networks: [securebank]

  prometheus:
    image: prom/prometheus:latest
    container_name: securebank-prometheus
    profiles: [observability]
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks: [securebank]

  grafana:
    image: grafana/grafana:latest
    container_name: securebank-grafana
    profiles: [observability]
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    networks: [securebank]

# -----------------------------------------------------------------------------
volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  prometheus-data:
  grafana-data:

networks:
  securebank:
    driver: bridge
