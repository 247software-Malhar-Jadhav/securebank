# Prometheus scrape config for the SecureBank local stack.
# The backend exposes Micrometer metrics at /api/actuator/prometheus.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: securebank-backend
    metrics_path: /api/actuator/prometheus
    static_configs:
      - targets: ["backend:8080"]
        labels:
          application: securebank-backend
