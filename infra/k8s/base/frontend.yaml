# =============================================================================
# Frontend — Deployment + Service (nginx serving the React build)
# =============================================================================
# The nginx config comes from the frontend-nginx ConfigMap and is mounted over
# /etc/nginx/conf.d/default.conf. If your frontend Dockerfile already ships its
# own nginx.conf, delete the volume + volumeMount below.
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: securebank
  labels:
    app.kubernetes.io/name: frontend
spec:
  selector:
    app.kubernetes.io/name: frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: securebank
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: securebank
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/247software-malhar-jadhav/securebank-frontend:latest
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: nginx-config
          configMap:
            name: frontend-nginx
