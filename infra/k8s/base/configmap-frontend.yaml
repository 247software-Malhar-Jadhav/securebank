# nginx config for the frontend pod. Serves the React SPA and proxies /api to the
# backend Service so the browser only ever talks to one origin (no CORS headaches).
# If your frontend Dockerfile already bakes in an nginx.conf you can drop this and
# remove the volume mount in deployment-frontend.yaml.
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-nginx
  namespace: securebank
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: securebank
data:
  default.conf: |
    server {
      listen       80;
      server_name  _;
      root         /usr/share/nginx/html;
      index        index.html;

      # gzip for the JS/CSS bundles
      gzip on;
      gzip_types text/plain text/css application/json application/javascript
                 application/xml text/xml application/xml+rss image/svg+xml;

      # SPA: every unknown path falls back to index.html (react-router handles it)
      location / {
        try_files $uri $uri/ /index.html;
      }

      # Proxy API calls to the backend Service inside the cluster.
      location /api/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
      }

      # Health endpoint for the nginx container itself
      location = /healthz {
        access_log off;
        return 200 "ok\n";
      }
    }
