# =============================================================================
# PostgreSQL 16 — StatefulSet + headless Service + PVC (volumeClaimTemplate)
# =============================================================================
# A StatefulSet gives the DB a stable network identity (postgres-0) and stable
# storage. This is fine for dev/demo. For REAL production prefer a managed DB
# (Amazon RDS / Cloud SQL / Azure Database) — see infra/docs/kubernetes-guide.md.
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: securebank
  labels:
    app.kubernetes.io/name: postgres
spec:
  clusterIP: None        # headless: DNS resolves directly to the pod
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: securebank
  labels:
    app.kubernetes.io/name: postgres
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
              name: postgres
          envFrom:
            - secretRef:
                name: postgres-secrets
          env:
            # Keep PGDATA in a subdir so the mount root isn't the data dir.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "securebank", "-d", "securebank"]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "securebank", "-d", "securebank"]
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
