# =============================================================================
# Templated Secret — PLACEHOLDERS ONLY. DO NOT COMMIT REAL VALUES.
# =============================================================================
# This file uses `stringData` so values are plain text (Kubernetes base64-encodes
# them for you). The values below are obvious placeholders.
#
# !!! PRODUCTION !!!
#   Do NOT manage real secrets in git. Use one of:
#     - Bitnami Sealed Secrets  (encrypt -> safe to commit the SealedSecret)
#     - HashiCorp Vault + the Vault Agent Injector / VSO
#     - External Secrets Operator backed by AWS/GCP/Azure secret managers
#     - Cloud-native CSI secrets store driver
#   The overlays reference this Secret by name; swap the generator/source there.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: securebank
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: securebank
type: Opaque
stringData:
  # DB credentials (must match the postgres StatefulSet / managed DB)
  SPRING_DATASOURCE_USERNAME: "securebank"
  SPRING_DATASOURCE_PASSWORD: "REPLACE_ME_db_password"

  # RabbitMQ credentials
  SPRING_RABBITMQ_USERNAME: "securebank"
  SPRING_RABBITMQ_PASSWORD: "REPLACE_ME_rabbit_password"

  # JWT signing secret (32+ chars; issuer is fixed to 'securebank')
  SECUREBANK_JWT_SECRET: "REPLACE_ME_with_a_long_random_32+_char_secret"

  # External AI / LLM provider API key (blank => deterministic fallback)
  SECUREBANK_AI_API_KEY: "REPLACE_ME_ai_api_key"
---
# Postgres needs its own credentials too (consumed by the postgres StatefulSet).
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: securebank
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: securebank
type: Opaque
stringData:
  POSTGRES_DB: "securebank"
  POSTGRES_USER: "securebank"
  POSTGRES_PASSWORD: "REPLACE_ME_db_password"
---
# RabbitMQ default user/pass.
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-secrets
  namespace: securebank
  labels:
    app.kubernetes.io/name: rabbitmq
    app.kubernetes.io/part-of: securebank
type: Opaque
stringData:
  RABBITMQ_DEFAULT_USER: "securebank"
  RABBITMQ_DEFAULT_PASS: "REPLACE_ME_rabbit_password"
