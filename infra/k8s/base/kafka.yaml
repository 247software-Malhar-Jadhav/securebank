# =============================================================================
# Kafka + Zookeeper — StatefulSets + Services (single broker, dev-grade)
# =============================================================================
# This runs a single-broker Kafka with a single Zookeeper. It is intentionally
# simple so a local cluster (kind/minikube) can run it.
#
# !!! PRODUCTION RECOMMENDATION !!!
#   Do NOT hand-roll Kafka in prod. Use the Strimzi operator (declarative Kafka
#   CRs, rolling upgrades, rebalancing, TLS, KRaft). A ready-to-apply Strimzi
#   Kafka CR is provided at base/kafka-strimzi.example.yaml.
# =============================================================================

# ---- Zookeeper ----
apiVersion: v1
kind: Service
metadata:
  name: zookeeper
  namespace: securebank
  labels:
    app.kubernetes.io/name: zookeeper
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: zookeeper
  ports:
    - name: client
      port: 2181
      targetPort: 2181
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: zookeeper
  namespace: securebank
  labels:
    app.kubernetes.io/name: zookeeper
spec:
  serviceName: zookeeper
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: zookeeper
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zookeeper
    spec:
      containers:
        - name: zookeeper
          image: confluentinc/cp-zookeeper:7.6.1
          env:
            - name: ZOOKEEPER_CLIENT_PORT
              value: "2181"
            - name: ZOOKEEPER_TICK_TIME
              value: "2000"
          ports:
            - containerPort: 2181
              name: client
          readinessProbe:
            tcpSocket:
              port: 2181
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: data
              mountPath: /var/lib/zookeeper/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
---
# ---- Kafka ----
# Headless Service so the broker advertises a stable DNS name (kafka:9092).
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: securebank
  labels:
    app.kubernetes.io/name: kafka
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: kafka
  ports:
    - name: kafka
      port: 9092
      targetPort: 9092
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: securebank
  labels:
    app.kubernetes.io/name: kafka
spec:
  serviceName: kafka
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kafka
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kafka
    spec:
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.6.1
          ports:
            - containerPort: 9092
              name: kafka
          env:
            - name: KAFKA_BROKER_ID
              value: "1"
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: "zookeeper:2181"
            # Advertise the in-cluster Service DNS name so clients reconnect correctly.
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://0.0.0.0:9092"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://kafka:9092"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "PLAINTEXT:PLAINTEXT"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "PLAINTEXT"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "false"
          readinessProbe:
            exec:
              command: ["kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
          resources:
            requests:
              cpu: "250m"
              memory: "768Mi"
            limits:
              cpu: "1"
              memory: "1536Mi"
          volumeMounts:
            - name: data
              mountPath: /var/lib/kafka/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
# ---- Topic creation Job ----
# Equivalent of the compose kafka-init container: creates the three spec topics.
apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-init-topics
  namespace: securebank
  labels:
    app.kubernetes.io/name: kafka-init
spec:
  backoffLimit: 10
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kafka-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: create-topics
          image: confluentinc/cp-kafka:7.6.1
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              echo "Waiting for Kafka..."
              until kafka-broker-api-versions --bootstrap-server kafka:9092 >/dev/null 2>&1; do
                sleep 5; echo "...still waiting for kafka:9092";
              done
              for t in securebank.transactions securebank.fraud-alerts securebank.notifications; do
                kafka-topics --bootstrap-server kafka:9092 \
                  --create --if-not-exists --topic "$t" \
                  --partitions 3 --replication-factor 1
              done
              echo "Topics:"; kafka-topics --bootstrap-server kafka:9092 --list
