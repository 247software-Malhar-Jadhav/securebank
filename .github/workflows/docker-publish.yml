# =============================================================================
# Docker publish — build & push backend + frontend images to GHCR.
# =============================================================================
# Triggers on push to main and on version tags (v*). Uses buildx + GitHub Actions
# layer cache. Auth uses the built-in GITHUB_TOKEN (no PAT needed) thanks to the
# packages:write permission below.
#
# Images:
#   ghcr.io/247software-malhar-jadhav/securebank-backend
#   ghcr.io/247software-malhar-jadhav/securebank-frontend
# =============================================================================
name: Docker Publish

on:
  push:
    branches: ["main"]
    tags: ["v*"]

permissions:
  contents: read
  packages: write        # required to push to GHCR with GITHUB_TOKEN

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: 247software-malhar-jadhav

jobs:
  build-and-push:
    name: Build & push (${{ matrix.component }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: backend
            context: ./backend
            image: securebank-backend
          - component: frontend
            context: ./frontend
            image: securebank-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}
          provenance: false
