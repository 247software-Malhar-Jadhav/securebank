# =============================================================================
# English (en) message bundle - the default locale.
#
# Keys are grouped by area. The same keys exist in messages_hi.properties and
# messages_mr.properties so the backend can return any of the three languages
# based on Accept-Language. The GET /api/i18n/{locale} endpoint serves the whole
# bundle to the frontend.
# =============================================================================

# ---- Generic / errors ----
error.internal=An unexpected error occurred. Please try again later.
error.validation=Validation failed: {0}
error.concurrency.conflict=The record was modified concurrently. Please retry.
error.auth.badCredentials=Invalid username or password.
error.auth.accessDenied=You do not have permission to perform this action.
error.auth.accountLocked=Account is locked. Try again later.
error.auth.usernameTaken=That username is already taken.
error.auth.emailTaken=That email is already registered.

# ---- Accounts ----
error.account.notFound=Account {0} was not found.
error.account.notOwned=You do not own this account.
error.customer.notFound=Customer profile not found.

# ---- Transactions ----
error.transaction.notFound=Transaction {0} was not found.
error.transaction.insufficientFunds=Insufficient funds in account {0}.
error.transaction.accountNotActive=Account {0} is not active.
error.transaction.kycNotVerified=KYC verification is required before moving money.
error.transaction.perTxnLimit=Amount exceeds the per-transaction limit.
error.transaction.dailyLimit=Amount exceeds your daily transfer limit.
error.transaction.fraudBlocked=Transaction blocked by fraud check (score {0}).
error.transaction.sameAccount=Source and destination accounts must differ.

# ---- Validation field messages (referenced by @NotNull etc.) ----
validation.amount.positive=Amount must be greater than zero.
validation.required=This field is required.

# ---- Notification templates (used by the notification consumer) ----
notification.transaction.completed=Your {0} of {1} {2} on account {3} completed successfully.
notification.transaction.failed=Your {0} of {1} {2} on account {3} could not be completed.

# ---- Spending insights (template fallback when the LLM is unavailable) ----
insights.summary.template=Over the selected period you spent {0} {1} across {2} categories. Your largest category was {3}.
insights.summary.empty=No spending was recorded for the selected period.
